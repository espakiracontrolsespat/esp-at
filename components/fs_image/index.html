<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EVOLVE</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}.home-wrap{height:100vh;background:linear-gradient(135deg,#e8f5f2,#fff);display:flex;flex-direction:column;align-items:center;justify-content:center}.brand{font-size:38px;color:#046a53;font-weight:700;position:relative;top:-20px;letter-spacing:1px;display:flex;align-items:flex-start}.brand .black-o{color:#000}.tm{font-size:12px;margin-left:2px;position:relative;top:4px;color:#000}.content{width:90%;max-width:360px;padding:20px;border-radius:16px;background:rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(0,0,0,.08);margin-top:10px}.section-title{font-size:16px;color:#333;margin-bottom:10px;font-weight:700;text-align:center}.device-item{margin-bottom:12px}.device-item input{width:100%;padding:12px;border-radius:8px;border:1px solid #ddd;font-size:14px}.device-item input:focus{border-color:#046a53}.btn-wrap button{width:100%;padding:12px;border:none;border-radius:8px;background:#046a53;color:#fff;font-size:14px;cursor:pointer;transition:.3s}.btn-wrap button:hover{background:#035942}.scan-btn{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #046a53;background:#046a53;color:#fff;cursor:pointer;transition:.3s}.scan-btn:hover{background:#035942}.wifi-list{border:1px solid #ddd;border-radius:8px;max-height:120px;overflow:auto;margin-top:8px;display:none;background:#fff}.wifi-item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}.wifi-item:active{background:#f2f8f7}#message{margin-top:5px;font-size:12px;color:#046a53;border:none;text-align:center}</style></head><body><div class="home-wrap"><div class="brand">EV<span class="black-o">O</span>LVE<span class="tm">TM</span></div><div class="content"><div class="section-title">Wi-Fi Credentials</div><div class="device-item"><input id="ssid" placeholder="SSID"></div><div class="device-item"><input id="password" type="password" placeholder="Password"></div><div class="device-item"><input id="message" disabled="disabled" placeholder="Status"></div><div class="btn-wrap"><button onclick="postData()">Connect</button></div><button class="scan-btn" onclick="scanWifi()">Scan Wi-Fi</button><div id="wifiList" class="wifi-list"></div></div></div><script>function g(e){return document.getElementById(e)}function get(e,s){var a=new XMLHttpRequest;a.open("GET",e,1),a.onreadystatechange=function(){4==a.readyState&&(200==a.status?s(a.responseText):g("message").value="Request failed")},a.send()}function post(e,s,a){var t=new XMLHttpRequest;t.open("POST",e,1),t.setRequestHeader("Content-Type","application/json"),t.onreadystatechange=function(){4==t.readyState&&(200==t.status?a(t.responseText):g("message").value="Connect failed")},t.send(s)}function getData(){get("/getstainfo",function(e){try{var s=JSON.parse(e);g("ssid").value=s.sta_ssid||"",g("password").value=s.sta_password||"",g("message").value=s.message||""}catch(e){}})}function scanWifi(){g("message").value="Scanning...",get("/getaprecord",function(e){try{var s=JSON.parse(e),a=g("wifiList");if(!s.aplist)return void(g("message").value="Scan failed");a.innerHTML="",a.style.display="block";for(var t=0;t<s.aplist.length&&t<10;t++){var n=document.createElement("div");n.className="wifi-item",n.innerHTML=s.aplist[t].ssid,n.onclick=function(){g("ssid").value=this.innerHTML,a.style.display="none"},a.appendChild(n)}g("message").value=""}catch(e){g("message").value="Error"}})}function postData(){var e=g("ssid").value,s=g("password").value;if(e){g("message").value="Connecting...";var a={ssid_len:e.length,ssid:e,password_len:s.length,password:s};post("/setstainfo",JSON.stringify(a),function(e){try{var s=JSON.parse(e);g("message").value=s.message||"Done"}catch(e){g("message").value="Connected"}})}else g("message").value="Enter SSID"}getData()</script></body></html>
